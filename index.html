```html
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sorry</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Nunito", sans-serif;
    }

    /* background */

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
    }

    /* overlay */

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .75);
      backdrop-filter: blur(4px);
    }

    /* container */

    .container {
      position: relative;
      text-align: center;
      padding: 25px;
      width: 90%;
      max-width: 450px;
      z-index: 2;
    }

    /* title */

    .title {
      font-family: "Pacifico", cursive;
      font-size: 42px;
      color: #ff3e6c;
      animation: pop 1s ease;
    }
    .title2  {
      font-family:  cursive;
      font-size: 42px;
      color: #ff3e6c;
      animation: pop 1s ease;
    }

    @keyframes pop {
      0% {
        transform: scale(0);
        opacity: 0
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    /* message */

    .message {
      margin-top: 20px;
      font-size: 18px;
      color: #444;
      min-height: 60px;
      line-height: 1.5;
    }

    /* button */

    .btn {
      margin-top: 30px;
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      background: #ff3e6c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: .25s;
      box-shadow: 0 5px 20px rgba(255, 60, 100, .35);
    }

    .btn:hover {
      transform: scale(1.08);
    }

    /* floating hearts */

    .heart {
      position: absolute;
      bottom: -40px;
      color: #ff4d6d;
      font-size: 22px;
      pointer-events: none;
      animation: float 6s linear forwards;
      opacity: .85;
    }

    @keyframes float {

      0% {
        transform: translateY(0) scale(.6);
        opacity: 0;
      }

      40% {
        opacity: 1;
      }

      100% {
        transform: translateY(-110vh) scale(1.3);
        opacity: 0;
      }

    }

    /* popup */

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: white;
      padding: 30px;
      border-radius: 18px;
      text-align: center;
      width: 85%;
      max-width: 350px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .2);
      transition: .35s;
      z-index: 10;
    }

    .popup.active {
      transform: translate(-50%, -50%) scale(1);
    }

    .popup h2 {
      color: #ff3e6c;
      margin-bottom: 10px;
    }

    .popup p {
      color: #555;
      margin-bottom: 20px;
    }

    .close {
      padding: 10px 20px;
      border: none;
      background: #ff3e6c;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    /* shower items */

    .shower-item {
      position: fixed;
      top: -50px;
      pointer-events: none;
      z-index: 50;
      animation: fall linear forwards;
    }

    @keyframes fall {

      0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }

    }

    .petal {
      color: #ff6b81;
      font-size: 24px;
    }
  </style>

</head>

<body>

  <div class="container">

    <h1 class="title">I'm Really Sorry</h1>
    <h1 class="title2"> NANDU</h1>

    <p class="message" id="text"></p>

    <button class="btn" onclick="handleForgive()">Forgive Me Please Betu</button>

  </div>

  <div class="popup" id="popup">

    <h2>Thank You</h2>

    <p>Your forgiveness means everything to me ❤️
      Thank you for giving me a chance to make things right. I promise to be better and make it up to you. I love you so much!
    </p>

    <button class="close" onclick="closePopup()">Close</button>

  </div>

  <script>
    /* typing message */

    const msg =
      "I know I made a mistake and I am truly sorry. You mean so much to me and I hate the thought of hurting you. Please forgive me and give me a chance to make things right.";

    let index = 0;

    function typeWriter() {

      if (index < msg.length) {

        document.getElementById("text").innerHTML += msg.charAt(index);

        index++;

        setTimeout(typeWriter, 50);

      }

    }

    typeWriter();

    /* floating hearts background */

    function createHeart() {

      const heart = document.createElement("div");

      heart.className = "heart";
      heart.innerHTML = "❤";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 18 + 16) + "px";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 6000);

    }

    setInterval(createHeart, 400);

    /* button click */

    function handleForgive() {

      openPopup();
      startShowerAnimation();

    }

    /* heart + rose rain */

    function startShowerAnimation() {

      const duration = 5000;
      const intervalTime = 80;

      const showerInterval = setInterval(() => {

        createShower("❤️");
        createShower("🌹", "petal");
        createShower("🥰");

      }, intervalTime);

      setTimeout(() => {

        clearInterval(showerInterval);
        sendWhatsApp();

      }, duration);

    }

    function createShower(symbol, className = "") {

      const el = document.createElement("div");

      el.className = "shower-item " + className;
      el.innerHTML = symbol;

      el.style.left = Math.random() * 100 + "vw";
      el.style.fontSize = (Math.random() * 20 + 18) + "px";
      el.style.animationDuration = (Math.random() * 2 + 3) + "s";

      document.body.appendChild(el);

      setTimeout(() => el.remove(), 5000);

    }

    /* popup */

    function openPopup() {
      document.getElementById("popup").classList.add("active");
    }

    function closePopup() {
      document.getElementById("popup").classList.remove("active");
    }

    /* whatsapp redirect */

    function sendWhatsApp() {

      const phone = "919993534374"; // replace number

      const text = encodeURIComponent(
        "Ha dekh li beta kar dita maaf"
      );

      window.open(`https://wa.me/${phone}?text=${text}`, "_blank");

    }
  </script>

</body>

</html>
```
